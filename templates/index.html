<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aktienbewerter 2029</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f7;
      color: #1a1d2e;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 { text-align: center; font-size: 2rem; color: #1a1d2e; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 36px; font-size: 0.95rem; }

    .search-box {
      display: flex; gap: 10px;
      max-width: 520px; margin: 0 auto 40px;
    }
    .search-box input {
      flex: 1; padding: 14px 18px; border-radius: 10px;
      border: 1px solid #dde1ec; background: #fff; color: #1a1d2e;
      font-size: 1rem; outline: none; transition: border 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .search-box input:focus { border-color: #4f8ef7; box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    .search-box button {
      padding: 14px 22px; border-radius: 10px; border: none;
      background: #4f8ef7; color: #fff; font-size: 1rem;
      cursor: pointer; font-weight: 600; white-space: nowrap;
      transition: background 0.2s; box-shadow: 0 2px 8px rgba(79,142,247,0.3);
    }
    .search-box button:hover { background: #3a78e0; }

    #result { max-width: 820px; margin: 0 auto; }

    .card {
      background: #fff; border-radius: 16px;
      padding: 24px; margin-bottom: 20px;
      border: 1px solid #e4e8f0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .company-header { margin-bottom: 20px; }
    .company-header h2 { font-size: 1.5rem; color: #1a1d2e; }
    .company-header span { color: #999; font-size: 0.9rem; }

    .metrics-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .metric {
      background: #f7f8fc; border-radius: 10px;
      padding: 12px 18px; flex: 1; min-width: 130px;
      border: 1px solid #eaecf4;
    }
    .metric .label { color: #999; font-size: 0.75rem; margin-bottom: 4px; }
    .metric .value { color: #1a1d2e; font-size: 1.1rem; font-weight: 700; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }

    .score-card { background: #f7f8fc; border-radius: 12px; padding: 18px; border: 1px solid #eaecf4; }
    .score-card h3 { font-size: 0.9rem; color: #999; margin-bottom: 14px; }
    .big-number { font-size: 1.9rem; font-weight: 800; color: #1a1d2e; line-height: 1; margin-bottom: 2px; }
    .score-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; }

    .progress-bar { height: 7px; background: #e4e8f0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .scale-note { font-size: 0.72rem; color: #bbb; margin-top: 8px; }

    /* Gesamtbewertung */
    .gauge-wrapper { text-align: center; padding: 8px 0; }
    .gauge-score { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .gauge-max { font-size: 1.1rem; color: #aaa; }
    .gauge-label { font-size: 1.05rem; font-weight: 700; margin-top: 6px; }
    .gauge-bar {
      height: 14px; background: #e4e8f0; border-radius: 7px;
      overflow: visible; margin-top: 18px; position: relative;
    }
    .gauge-fill {
      height: 100%; border-radius: 7px;
      background: linear-gradient(90deg, #ff4444 0%, #ff8800 30%, #ffd700 55%, #88cc00 75%, #00c851 100%);
      transition: width 0.9s ease;
    }
    .gauge-marker {
      position: absolute; top: -7px;
      width: 4px; height: 28px; background: #1a1d2e;
      border-radius: 2px; transform: translateX(-50%);
      transition: left 0.9s ease;
    }

    /* Kursziel */
    .target-card {
      background: #fff; border-radius: 16px;
      padding: 24px; margin-bottom: 20px;
      border: 1px solid #e4e8f0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .target-card h3 { font-size: 1.1rem; color: #999; margin-bottom: 20px; }

    .target-main {
      display: flex; align-items: center;
      justify-content: space-between; gap: 20px;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .target-now, .target-arrow, .target-goal { text-align: center; }
    .target-now .tl, .target-goal .tl { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
    .target-now .tp { font-size: 1.8rem; font-weight: 800; color: #1a1d2e; }
    .target-goal .tp { font-size: 2.4rem; font-weight: 900; }
    .target-arrow { font-size: 2rem; color: #ccc; flex: 1; }

    .upside-badge {
      display: inline-block;
      padding: 6px 16px; border-radius: 20px;
      font-size: 1.1rem; font-weight: 800; margin-top: 6px;
    }

    .target-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .method-box { background: #f7f8fc; border-radius: 10px; padding: 14px; border: 1px solid #eaecf4; }
    .method-box .ml { font-size: 0.72rem; color: #aaa; margin-bottom: 6px; }
    .method-box .mv { font-size: 1.1rem; font-weight: 700; color: #1a1d2e; }
    .method-box .ms { font-size: 0.72rem; color: #bbb; margin-top: 4px; }

    .target-note {
      padding: 10px 14px; background: #fff8f0;
      border-left: 3px solid #ff8800; border-radius: 6px;
      font-size: 0.8rem; color: #b06000; line-height: 1.5;
    }

    .info-note {
      margin-top: 16px; padding: 12px 16px;
      background: #f0f5ff; border-left: 3px solid #4f8ef7;
      border-radius: 6px; font-size: 0.82rem; color: #5a7ab0; line-height: 1.6;
    }

    .add-btn {
      margin-top: 16px; width: 100%; padding: 12px;
      border-radius: 10px; border: 2px dashed #4f8ef7;
      background: transparent; color: #4f8ef7;
      font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    .add-btn:hover { background: #f0f5ff; }
    .add-btn.added { border-color: #00a844; color: #00a844; }

    .error {
      background: #fff5f5; border: 1px solid #ffb3b3;
      border-radius: 10px; padding: 20px; color: #c0392b; text-align: center;
    }
    .loading { text-align: center; padding: 60px; color: #aaa; font-size: 1.05rem; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #e4e8f0;
      border-top-color: #4f8ef7; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Watchlist */
    #watchlist-section { max-width: 820px; margin: 40px auto 0; }
    .watchlist-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .watchlist-header h2 { font-size: 1.3rem; color: #1a1d2e; }
    .refresh-btn {
      padding: 9px 18px; border-radius: 8px;
      border: 1px solid #dde1ec; background: #fff;
      color: #4f8ef7; font-size: 0.9rem; cursor: pointer;
      font-weight: 600; transition: background 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .refresh-btn:hover { background: #f0f5ff; }
    .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    .watchlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
      gap: 16px;
    }

    .wl-card {
      background: #fff; border-radius: 14px;
      padding: 20px; border: 1px solid #e4e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      position: relative; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .wl-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,142,247,0.15);
      border-color: #b3ccff;
    }
    .wl-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 14px;
    }
    .wl-name { font-size: 1rem; font-weight: 700; color: #1a1d2e; }
    .wl-ticker { font-size: 0.78rem; color: #aaa; margin-top: 2px; }
    .wl-date { font-size: 0.68rem; color: #ccc; margin-top: 3px; }

    .wl-score-big { font-size: 2rem; font-weight: 900; line-height: 1; }
    .wl-score-sub { font-size: 0.7rem; color: #bbb; }

    .wl-metrics { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .wl-metric {
      background: #f7f8fc; border-radius: 8px;
      padding: 7px 10px; flex: 1; min-width: 75px;
      border: 1px solid #eaecf4;
    }
    .wl-metric .wlml { font-size: 0.65rem; color: #bbb; margin-bottom: 2px; }
    .wl-metric .wlmv { font-size: 0.88rem; font-weight: 700; color: #1a1d2e; }

    .wl-target-row {
      display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
    }
    .wl-target-box {
      background: #f7f8fc; border-radius: 8px;
      padding: 8px 12px; flex: 1; border: 1px solid #eaecf4;
    }
    .wl-target-box .wlml { font-size: 0.65rem; color: #bbb; margin-bottom: 2px; }
    .wl-target-box .wlmv { font-size: 1rem; font-weight: 800; }

    .wl-upside {
      padding: 8px 14px; border-radius: 8px;
      font-size: 0.95rem; font-weight: 800; white-space: nowrap;
    }

    .chart-container { position: relative; height: 110px; }

    .remove-btn {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; color: #ddd;
      cursor: pointer; font-size: 1.1rem; transition: color 0.2s; padding: 4px;
      z-index: 10;
    }
    .remove-btn:hover { color: #e74c3c; }

    .click-hint {
      font-size: 0.7rem; color: #ccc; text-align: center;
      margin-top: 10px; letter-spacing: 0.02em;
    }

    .empty-watchlist {
      text-align: center; padding: 40px; color: #bbb;
      border: 2px dashed #e4e8f0; border-radius: 14px; font-size: 0.95rem;
      background: #fff;
    }

    @media (max-width: 500px) {
      .two-col, .target-methods, .watchlist-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<h1>📊 Aktienbewerter 2029</h1>
<p class="subtitle">Automatische Bewertung &amp; Kurszielberechnung auf Basis von Analystenprognosen</p>

<div class="search-box">
  <input id="ticker" type="text" placeholder="Ticker eingeben (z.B. AAPL, MSFT, SAP.DE)"/>
  <button onclick="bewerten()">🔍 Bewerten</button>
</div>

<div id="result"></div>

<div id="watchlist-section">
  <div class="watchlist-header">
    <h2>📋 Watchlist</h2>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshWatchlist()">🔄 Alle aktualisieren</button>
  </div>
  <div id="watchlist-grid" class="watchlist-grid">
    <div class="empty-watchlist">Noch keine Aktien gespeichert.<br>Aktie bewerten → zur Watchlist hinzufügen.</div>
  </div>
</div>

<script>
  function getColor(score) {
    if (score >= 8.5) return "#00a844";
    if (score >= 7.0) return "#5a9e00";
    if (score >= 5.5) return "#c48a00";
    if (score >= 3.5) return "#d4600a";
    return "#c0392b";
  }
  function getUpsideColor(pct) {
    if (pct >= 50)  return "#00a844";
    if (pct >= 20)  return "#5a9e00";
    if (pct >= 0)   return "#c48a00";
    if (pct >= -20) return "#d4600a";
    return "#c0392b";
  }
  function getUpsideBg(pct) {
    if (pct >= 20)  return "rgba(0,168,68,0.10)";
    if (pct >= 0)   return "rgba(196,138,0,0.10)";
    if (pct >= -20) return "rgba(212,96,10,0.10)";
    return "rgba(192,57,43,0.10)";
  }

  let currentData = null;

  document.getElementById("ticker").addEventListener("keydown", e => {
    if (e.key === "Enter") bewerten();
  });

  function buildResultHTML(d) {
    const scoreColor = d.total_score != null ? getColor(d.total_score) : "#aaa";
    const pct = d.total_score != null ? (d.total_score / 10 * 100) : 0;

    const umsatzHtml = d.kuv_2029 ? `
      <div class="score-card">
        <h3>📈 Umsatzbewertung</h3>
        <div style="color:#bbb;font-size:0.75rem">Umsatz 2029 (proj.)</div>
        <div style="font-size:1.05rem;font-weight:700;color:#1a1d2e;margin-bottom:6px">${d.rev_2029}</div>
        <div style="color:#bbb;font-size:0.75rem">KUV 2029</div>
        <div class="big-number">${d.kuv_2029}×</div>
        <div class="score-label" style="color:${getColor(d.kuv_score)}">${d.kuv_label} · ${d.kuv_score}/10</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${d.kuv_score*10}%;background:${getColor(d.kuv_score)}"></div></div>
        <div class="scale-note">&lt;1× sehr gut | 1–2× gut | 2–3× okay | &gt;3× teuer</div>
      </div>` :
      `<div class="score-card"><h3>📈 Umsatzbewertung</h3><p style="color:#ccc;margin-top:10px">Keine Daten verfügbar</p></div>`;

    const gewinnHtml = d.kgv_2029 ? `
      <div class="score-card">
        <h3>💰 Gewinnseitenbewertung</h3>
        <div style="color:#bbb;font-size:0.75rem">Gewinn 2029 (proj.)</div>
        <div style="font-size:1.05rem;font-weight:700;color:#1a1d2e;margin-bottom:6px">${d.earnings_2029}</div>
        <div style="color:#bbb;font-size:0.75rem">KGV 2029</div>
        <div class="big-number">${d.kgv_2029}×</div>
        <div class="score-label" style="color:${getColor(d.kgv_score)}">${d.kgv_label} · ${d.kgv_score}/10</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${d.kgv_score*10}%;background:${getColor(d.kgv_score)}"></div></div>
        <div class="scale-note">&lt;10× sehr gut | 10–15× gut | 15–20× okay | 20–25× schwach | &gt;25× teuer</div>
      </div>` :
      `<div class="score-card"><h3>💰 Gewinnseitenbewertung</h3><p style="color:#ccc;margin-top:10px">Keine Daten verfügbar</p></div>`;

    const gesamtHtml = d.total_score != null ? `
      <div class="card">
        <h3 style="color:#aaa;margin-bottom:18px">🎯 Gesamtbewertung</h3>
        <div class="gauge-wrapper">
          <div class="gauge-score" style="color:${scoreColor}">${d.total_score}</div>
          <div class="gauge-max">/ 10</div>
          <div class="gauge-label" style="color:${scoreColor}">${d.total_label}</div>
          <div class="gauge-bar">
            <div class="gauge-fill" style="width:${pct}%"></div>
            <div class="gauge-marker" style="left:${pct}%"></div>
          </div>
        </div>
        <div class="info-note">
          📌 Analystenerwartungen 2027 → projiziert mit <strong>${d.growth}% p.a.</strong> auf 2029 · Gewichtung: 40% Umsatz + 60% Gewinn
        </div>
      </div>` : "";

    let targetHtml = "";
    if (d.tp_combined) {
      const uPct = d.upside_pct;
      const uColor = getUpsideColor(uPct);
      const uBg = getUpsideBg(uPct);
      const uSign = uPct >= 0 ? "+" : "";

      const kgvM = d.tp_kgv ? `
        <div class="method-box">
          <div class="ml">KGV-Methode (aktuelles KGV: ${d.current_kgv_real ? d.current_kgv_real + '×' : 'n/a'} → ${d.eff_kgv}× auf 2029-Gewinn)</div>
          <div class="mv">${d.tp_kgv.toFixed(2)} ${d.currency}</div>
          ${d.kgv_note ? `<div class="ms">⚠ ${d.kgv_note}</div>` : ""}
        </div>` : "";

      const kuvM = d.tp_kuv ? `
        <div class="method-box">
          <div class="ml">KUV-Methode (aktuelles KUV: ${d.current_kuv_real ? d.current_kuv_real + '×' : 'n/a'} auf 2029-Umsatz)</div>
          <div class="mv">${d.tp_kuv.toFixed(2)} ${d.currency}</div>
          <div class="ms">Heutiges Kurs-Umsatz-Verhältnis bleibt konstant</div>
        </div>` : "";

      targetHtml = `
        <div class="target-card">
          <h3>🚀 Kursziel 2029</h3>
          <div class="target-main">
            <div class="target-now">
              <div class="tl">Heute</div>
              <div class="tp">${d.price}</div>
            </div>
            <div class="target-arrow">→</div>
            <div class="target-goal">
              <div class="tl">Kursziel 2029</div>
              <div class="tp" style="color:${uColor}">${d.tp_combined.toFixed(2)} ${d.currency}</div>
              <div><span class="upside-badge" style="color:${uColor};background:${uBg}">${uSign}${uPct}%</span></div>
            </div>
          </div>
          <div class="target-methods">${kgvM}${kuvM}</div>
          ${d.kgv_note ? `<div class="target-note">⚠️ ${d.kgv_note}</div>` : ""}
          <div style="font-size:0.75rem;color:#ccc;margin-top:10px">
            Kursziel = Heutiges Multiple × Gewinn/Umsatz 2029 · Kombination: 60% KGV + 40% KUV
          </div>
        </div>`;
    }

    return { umsatzHtml, gewinnHtml, gesamtHtml, targetHtml };
  }

  async function bewerten(symbolOverride) {
    const ticker = symbolOverride || document.getElementById("ticker").value.trim();
    if (!ticker) return;
    if (!symbolOverride) currentData = null;

    const box = document.getElementById("result");
    box.innerHTML = `<div class="loading"><div class="spinner"></div>Lade Daten für ${ticker.toUpperCase()} …</div>`;
    window.scrollTo({ top: 0, behavior: "smooth" });

    try {
      const res = await fetch(`/bewerten?ticker=${encodeURIComponent(ticker)}`);
      const d = await res.json();
      if (d.error) { box.innerHTML = `<div class="error">⚠️ ${d.error}</div>`; return; }
      currentData = d;

      const { umsatzHtml, gewinnHtml, gesamtHtml, targetHtml } = buildResultHTML(d);
      const inWL = await checkInWatchlist(d.symbol);
      const btnLabel = inWL ? "✅ In Watchlist" : "＋ Zur Watchlist hinzufügen";
      const btnClass = inWL ? "add-btn added" : "add-btn";

      box.innerHTML = `
        <div class="card">
          <div class="company-header">
            <h2>${d.name}</h2>
            <span>${d.symbol}</span>
          </div>
          <div class="metrics-row">
            <div class="metric"><div class="label">Marktkapitalisierung</div><div class="value">${d.market_cap}</div></div>
            <div class="metric"><div class="label">Aktueller Kurs</div><div class="value">${d.price}</div></div>
            <div class="metric"><div class="label">Anal. Wachstum 5J</div><div class="value">${d.growth}% p.a.</div></div>
          </div>
          <div class="two-col">${umsatzHtml}${gewinnHtml}</div>
          <button class="${btnClass}" id="add-btn" onclick="addToWatchlist()">${btnLabel}</button>
        </div>
        ${gesamtHtml}
        ${targetHtml}
      `;
    } catch (e) {
      box.innerHTML = `<div class="error">⚠️ Fehler: ${e.message}</div>`;
    }
  }

  // Watchlist
  async function checkInWatchlist(symbol) {
    try {
      const res = await fetch("/watchlist");
      return symbol in await res.json();
    } catch { return false; }
  }

  async function addToWatchlist() {
    if (!currentData) return;
    const btn = document.getElementById("add-btn");
    btn.disabled = true;
    await fetch("/watchlist/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(currentData)
    });
    btn.textContent = "✅ In Watchlist";
    btn.className = "add-btn added";
    btn.disabled = false;
    loadWatchlist();
  }

  async function removeFromWatchlist(symbol) {
    await fetch(`/watchlist/remove/${symbol}`, { method: "DELETE" });
    loadWatchlist();
  }

  async function loadWatchlist() {
    const res = await fetch("/watchlist");
    renderWatchlist(await res.json());
  }

  function renderWatchlist(wl) {
    const grid = document.getElementById("watchlist-grid");
    const symbols = Object.keys(wl);

    if (symbols.length === 0) {
      grid.innerHTML = `<div class="empty-watchlist">Noch keine Aktien gespeichert.<br>Aktie bewerten → zur Watchlist hinzufügen.</div>`;
      return;
    }

    if (window._wlCharts) window._wlCharts.forEach(c => c.destroy());
    window._wlCharts = [];

    grid.innerHTML = symbols.map(sym => {
      const item = wl[sym];
      const history = item.history || [];
      const latest = history[history.length - 1] || {};
      const ld = item.latest || {};
      const score = latest.total_score;
      const sColor = score != null ? getColor(score) : "#aaa";
      const upside = latest.upside_pct;
      const uColor = upside != null ? getUpsideColor(upside) : "#aaa";
      const uBg = upside != null ? getUpsideBg(upside) : "transparent";
      const uSign = upside != null && upside >= 0 ? "+" : "";

      return `
        <div class="wl-card" onclick="bewerten('${sym}')">
          <button class="remove-btn" onclick="event.stopPropagation();removeFromWatchlist('${sym}')" title="Entfernen">✕</button>
          <div class="wl-header">
            <div>
              <div class="wl-name">${item.name}</div>
              <div class="wl-ticker">${sym}</div>
              <div class="wl-date">${latest.date ? 'Stand: ' + latest.date : ''}</div>
            </div>
            <div style="text-align:right">
              <div class="wl-score-big" style="color:${sColor}">${score != null ? score : '—'}</div>
              <div class="wl-score-sub">Score /10</div>
            </div>
          </div>
          <div class="wl-metrics">
            <div class="wl-metric"><div class="wlml">Kurs</div><div class="wlmv">${ld.price || '—'}</div></div>
            <div class="wl-metric"><div class="wlml">Marktkapit.</div><div class="wlmv">${ld.market_cap || '—'}</div></div>
            <div class="wl-metric"><div class="wlml">KUV-Score</div><div class="wlmv">${latest.kuv_score ?? '—'}</div></div>
            <div class="wl-metric"><div class="wlml">KGV-Score</div><div class="wlmv">${latest.kgv_score ?? '—'}</div></div>
          </div>
          <div class="wl-target-row">
            <div class="wl-target-box">
              <div class="wlml">Kursziel 2029</div>
              <div class="wlmv" style="color:${uColor}">${latest.tp_combined != null ? latest.tp_combined.toFixed(2) + ' ' + (ld.currency || '') : '—'}</div>
            </div>
            ${upside != null ? `<div class="wl-upside" style="color:${uColor};background:${uBg}">${uSign}${upside}%</div>` : ''}
          </div>
          <div class="chart-container">
            <canvas id="chart-${sym}"></canvas>
          </div>
          <div class="click-hint">Klicken für Details</div>
        </div>`;
    }).join("");

    symbols.forEach(sym => {
      const history = (wl[sym].history || []).slice(-90);
      if (!history.length) return;
      const ctx = document.getElementById(`chart-${sym}`);
      if (!ctx) return;

      const chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: history.map(h => h.date),
          datasets: [
            {
              label: "Score",
              data: history.map(h => h.total_score),
              borderColor: "#4f8ef7",
              backgroundColor: "rgba(79,142,247,0.07)",
              borderWidth: 2,
              pointRadius: history.length < 8 ? 4 : 2,
              tension: 0.35, fill: true, yAxisID: "y",
            },
            {
              label: "Potenzial %",
              data: history.map(h => h.upside_pct),
              borderColor: "#00a844",
              borderWidth: 1.5,
              borderDash: [4, 3],
              pointRadius: 0,
              tension: 0.35, yAxisID: "y2",
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#aaa", font: { size: 10 }, boxWidth: 12 } },
            tooltip: {
              callbacks: {
                label: c => c.dataset.yAxisID === "y2"
                  ? ` Potenzial: ${c.parsed.y}%`
                  : ` Score: ${c.parsed.y}/10`
              }
            }
          },
          scales: {
            x: { ticks: { color: "#bbb", font: { size: 9 }, maxTicksLimit: 5 }, grid: { color: "#f0f0f0" } },
            y: {
              min: 0, max: 10, position: "left",
              ticks: { color: "#4f8ef7", font: { size: 9 }, stepSize: 2 },
              grid: { color: "#f0f0f0" }
            },
            y2: {
              position: "right",
              ticks: { color: "#00a844", font: { size: 9 }, callback: v => v + "%" },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
      window._wlCharts.push(chart);
    });
  }

  async function refreshWatchlist() {
    const btn = document.getElementById("refresh-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Aktualisiere …";
    try {
      const res = await fetch("/watchlist/refresh");
      const data = await res.json();
      renderWatchlist(data.data);
    } catch (e) {
      alert("Fehler: " + e.message);
    }
    btn.disabled = false;
    btn.textContent = "🔄 Alle aktualisieren";
  }

  loadWatchlist();
</script>
</body>
</html>
